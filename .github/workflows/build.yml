name: Build App

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    # Explicitly restrict permissions (important for pull_request_target)
    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          # Check out the PR's head commit, not the base branch
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Make build script executable
        run: chmod +x ./build.sh

      - name: Run build
        run: ./build.sh
